name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode 26.2
        run: sudo xcode-select -s /Applications/Xcode_26.2.app 2>/dev/null || echo "using default Xcode"
      - name: Build
        run: swift build -c release --arch arm64
      - name: Download Whisper model
        run: |
          mkdir -p models
          curl -fL "https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-base-q5_1.bin" -o models/ggml-base-q5_1.bin
      - name: Assemble app bundle
        run: |
          PRODUCT="askami"
          BUNDLE_ID="com.sebastianlungu.askami"
          BUILD_DIR=".build"
          ARCH="arm64-apple-macosx"
          RELEASE_DIR="$BUILD_DIR/$ARCH/release"

          APP_BUNDLE="$BUILD_DIR/$PRODUCT.app"
          rm -rf "$APP_BUNDLE"
          mkdir -p "$APP_BUNDLE/Contents/MacOS"
          mkdir -p "$APP_BUNDLE/Contents/Resources"
          mkdir -p "$APP_BUNDLE/Contents/Resources/models"

          cp "$RELEASE_DIR/$PRODUCT" "$APP_BUNDLE/Contents/MacOS/$PRODUCT"
          cp scripts/Info.plist "$APP_BUNDLE/Contents/"
          cp scripts/AppIcon.icns "$APP_BUNDLE/Contents/Resources/"
          cp scripts/ready-chime.mp3 "$APP_BUNDLE/Contents/Resources/"
          cp models/ggml-base-q5_1.bin "$APP_BUNDLE/Contents/Resources/models/"

          KOKORO_BUNDLE="$RELEASE_DIR/KokoroCoreML_KokoroCoreML.bundle"
          BARTG2P_BUNDLE="$RELEASE_DIR/swift-bart-g2p_BARTG2P.bundle"
          if [ -d "$KOKORO_BUNDLE" ]; then
            cp -R "$KOKORO_BUNDLE" "$APP_BUNDLE/Contents/Resources/"
          fi
          if [ -d "$BARTG2P_BUNDLE" ]; then
            cp -R "$BARTG2P_BUNDLE" "$APP_BUNDLE/Contents/Resources/"
          fi

          codesign --force --sign - \
            --identifier "$BUNDLE_ID" \
            --options runtime \
            --entitlements askami.entitlements \
            "$APP_BUNDLE"
      - name: Package
        run: |
          cd .build
          ditto -c -k --sequesterRsrc --keepParent askami.app askami-${{ github.ref_name }}.zip
      - name: Upload
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes "See [README](https://github.com/${{ github.repository }}) for setup instructions." \
            ".build/askami-${{ github.ref_name }}.zip"
