name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode 26.2
        run: sudo xcode-select -s /Applications/Xcode_26.2.app 2>/dev/null || echo "Xcode 26.2 not pre-installed; using default"
      - name: Build
        run: swift build -c release --arch arm64
      - name: Test
        run: swift test
